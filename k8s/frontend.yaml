apiVersion: v1
kind: Service
metadata:
  name: temperaturas-frontend-svc
  labels:
    app: temperaturas-frontend
spec:
  type: LoadBalancer
  ports:
    - port: 3001
  selector:
    app: temperaturas-frontend
    tier: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temperaturas-frontend
  labels:
    app: temperaturas-frontend
spec:
  selector:
    matchLabels:
      app: temperaturas-frontend
      tier: frontend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: temperaturas-frontend
        tier: frontend
    spec:
      containers:
        - name: temperaturas-frontend
          image: lucilu27819/temperaturas-frontend:latest
          ports:
            - containerPort: 3001
          env:
            - name: TEMP_SERVER
              value: "temperaturas-backend-svc:5000"